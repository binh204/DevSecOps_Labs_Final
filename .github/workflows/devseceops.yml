name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security-scan:

    runs-on: self-hosted

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show Docker Version
        run: docker --version

      - name: Show Docker Compose Version
        run: docker compose version

      - name: Run Semgrep
        run: docker compose run --rm semgrep

      - name: Run Trivy
        run: docker compose run --rm trivy