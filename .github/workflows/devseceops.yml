name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  security:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Check Docker and Docker Compose
        run: docker --version ; docker compose version

      - name: Run Semgrep
        run: bash ./scripts/run-semgrep.ps1

      - name: Run Trivy
        run: bash ./scripts/run-trivy.ps1

      - name: Run Checkov
        run: bash ./scripts/run-checkov.ps1

      - name: Build Image
        run: bash ./scripts/build-image.ps1

      - name: Push
        run: |
          docker tag juice-shop:v${{ github.run_number }} ghcr.io/binh204/juice-shop:${{ github.sha }}
          docker push ghcr.io/binh204/juice-shop:${{ github.sha }}

      - name: Deploy Juice Shop
        run: bash ./scripts/deploy.ps1

      - name: Health Check
        run: bash ./scripts/health-check.ps1

      - name: Run OWASP ZAP
        run: bash ./scripts/run-zap.ps1
        
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.run_number }}
          path: reports/