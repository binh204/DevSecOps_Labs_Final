services:

  juice-shop:
    build:
      context: ./juice-shop
    container_name: juice-shop
    ports:
      - "3000:3000"

  semgrep:
    image: semgrep/semgrep:latest
    container_name: semgrep

    working_dir: /src

    volumes:
      - ./juice-shop:/src
      - ./reports/semgrep:/reports

    command:
      - semgrep
      - scan
      - --config=auto
      - --json
      - --output=/reports/report.json
      - /src
    
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy

    working_dir: /project

    volumes:
      - ./juice-shop:/project
      - ./reports/trivy:/reports

    command:
      - fs
      - --format
      - json
      - --output
      - /reports/report.json
      - /project

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    working_dir: /zap/wrk
    volumes:
      - ./reports/zap:/zap/wrk

    entrypoint: ["sleep","infinity"]
    
  